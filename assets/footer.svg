<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 120" width="900" height="120">
  <defs>
    <linearGradient id="footerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
  </defs>
  
  <rect width="900" height="120" fill="url(#footerGrad)"/>
  
  <!-- 顶部装饰波浪线 -->
  <path d="M0,15 Q112,5 225,15 Q337,25 450,15 Q562,5 675,15 Q787,25 900,15" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.3">
    <animate attributeName="d" values="M0,15 Q112,5 225,15 Q337,25 450,15 Q562,5 675,15 Q787,25 900,15;M0,15 Q112,25 225,15 Q337,5 450,15 Q562,25 675,15 Q787,5 900,15;M0,15 Q112,5 225,15 Q337,25 450,15 Q562,5 675,15 Q787,25 900,15" dur="8s" repeatCount="indefinite"/>
  </path>
  
  <!-- 星星点缀 -->
  <g fill="#ffd700" opacity="0.5">
    <circle cx="100" cy="30" r="1"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="25" r="1.5"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="28" r="1"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="32" r="1.5"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- 中央文字 -->
  <text x="450" y="60" text-anchor="middle" fill="#ffd700" font-size="14" font-family="serif" opacity="0.8">
    ⭐ Star 本项目，穿越前记得先复习一遍
  </text>
  
  <!-- 底部导航提示 -->
  <text x="450" y="90" text-anchor="middle" fill="#888" font-size="11" font-family="sans-serif">
    MIT License · 知识自由传播，注明来源即可
  </text>
  
  <!-- 底部流动光线 -->
  <path d="M0,110 Q225,105 450,110 Q675,115 900,110" fill="none" stroke="#ffd700" stroke-width="0.5" opacity="0.2">
    <animate attributeName="d" values="M0,110 Q225,105 450,110 Q675,115 900,110;M0,110 Q225,115 450,110 Q675,105 900,110;M0,110 Q225,105 450,110 Q675,115 900,110" dur="5s" repeatCount="indefinite"/>
  </path>
</svg>
